name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-validation:
    name: Python Backend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black

      - name: Check Code Styling (Black)
        run: black --check .

      - name: Lint Code checks (Flake8 syntax limits)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Validate Django Configuration
        env:
          APP_ENV: test
          DJANGO_SECRET: ci-pipeline-django-insecure-secret-key-32-chars
          FASTAPI_SECRET: ci-pipeline-fastapi-insecure-secret-key-32-chars
          DATABASE_URL: postgres://postgres:postgrespassword@localhost:5432/whatsapp_agent
          OPENAI_KEY: ci-pipeline-openai-key-32-chars-long
          META_TOKEN: ci-pipeline-meta-token-32-chars-long
          EMAIL_KEY: ci-pipeline-email-key-32-chars-long
        run: python manage.py check

  node-validation:
    name: Next.js Frontend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install Node Dependencies
        working-directory: apps/admin
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint Next.js Project
        working-directory: apps/admin
        run: npm run lint --if-present
